<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>800+ Font Designer Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4facfe;
            --accent: #00f2fe;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-dark); 
            color: #f8fafc; 
            margin: 0; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            background-attachment: fixed;
        }

        /* Header Status */
        #status { 
            text-align: center; 
            margin-bottom: 20px; 
            font-size: 14px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Bảng điều khiển Lung Linh */
        .master-controls {
            position: sticky; top: 20px; z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 40px; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-group { display: flex; flex-direction: column; gap: 8px; width: 150px; }
        .control-group1 { display: flex; flex-direction: column; gap: 8px; width: 80px; }
        
        .control-group label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
        }

        input[type="text"] { 
            padding: 10px 15px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(79, 172, 254, 0.3); }

        /* Custom Range Slider */
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Color Input */
        input[type="color"] {
            -webkit-appearance: none;
            border: none; width: 100%; height: 35px;
            cursor: pointer; background: none;
        }
        input[type="color"]::-webkit-slider-thumb { border-radius: 10px; }

        /* Grid hiển thị Font */
        .font-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }

        /* Font Card tinh tế */
        .font-card { 
            background: var(--card-bg); 
            border-radius: 18px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .font-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-color: rgba(79, 172, 254, 0.4);
        }

        .preview-wrapper {
            height: 150px; display: flex; align-items: center; justify-content: center;
            background: var(--bg-color, #1a1a1a);
            overflow: hidden; position: relative;
            transition: background 0.3s;
        }

        .preview-text {
            font-size: var(--fs, 35px);
            color: var(--text-color, #4facfe);
            letter-spacing: var(--ls, 0px);
            -webkit-text-stroke: var(--sw, 0px) var(--sc, #000);
            white-space: nowrap;
            transition: 0.1s;
        }

        .card-footer { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(15, 23, 42, 0.5); 
        }

        .font-name { font-size: 12px; font-weight: 500; color: #cbd5e1; max-width: 60%; }
        
        .btn-download { 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #0f172a; border: none; padding: 8px 16px; 
            border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 11px;
            text-transform: uppercase; transition: 0.3s;
        }

        .btn-download:hover { transform: scale(1.05); filter: brightness(1.1); }

        .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--primary); border-top: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="status">Hệ thống đang sẵn sàng...</div>

<div class="master-controls">
    <div class="control-group">
        <label>Nội dung hiển thị</label>
        <input type="text" id="mainInput" value="Thầy Vũ Gia Kiệm" oninput="updateAll()">
    </div>
    
    <div class="control-group1">
        <label>Màu chữ </label>
            <input type="color" id="colorText" value="#4facfe" title="Màu chữ" oninput="updateAll()">
    </div>


   <div class="control-group1">
        <label>Màu nền</label>
        <input type="color" id="colorBg" value="#0f172a" title="Màu nền" oninput="updateAll()">
    </div>


    <div class="control-group1">
        <label>Màu viền</label>
        <input type="color" id="strokeColor" value="#000000" oninput="updateAll()">
    </div>



    <div class="control-group">
        <label>Size: <span id="fsVal">45</span>px</label>
        <input type="range" id="sizeFont" min="20" max="120" value="45" oninput="updateAll()">
    </div>

    <div class="control-group">
        <label>Khoảng cách: <span id="lsVal">0</span>px</label>
        <input type="range" id="spacingText" min="-10" max="40" value="0" oninput="updateAll()">
    </div>

    <div class="control-group">
        <label>Viền: <span id="swVal">0</span>px</label>
        <input type="range" id="strokeWidth" min="0" max="4" step="0.2" value="0" oninput="updateAll()">
    </div>

    
    <div class="control-group">
        <label>Tìm kiếm Font</label>
        <input type="text" id="filterInput" placeholder="Nhập tên..." oninput="filterFonts()">
    </div>
</div>

<div id="fontGrid" class="font-grid"></div>

<script>
    const IPFS_LINKS = [
        "https://tomato-delicate-zebra-533.mypinata.cloud/ipfs/bafybeihealjo5tc2mvh3ksx22ps7yjbpcj4pkm67r33qkx72ppw5lberau",
        "https://ipfs.io/ipfs/bafybeicbczbfcyi4ahwe4f5flrq2d2nalddy3usbjeiqy247pyeuybi63q",
        "https://ipfs.io/ipfs/bafybeibpq4mm4gojqtqe4q4bzaikdcglxmrnalniolnnet4nrc75f6ayt4"
    ];

    let db;
    let allCards = [];

    const req = indexedDB.open("FontStorePro", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("fonts", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadFonts(); };

    async function loadFonts() {
        const status = document.getElementById('status');
        const tx = db.transaction("fonts", "readonly");
        const saved = await new Promise(r => tx.objectStore("fonts").getAll().onsuccess = e => r(e.target.result));

        if (saved.length > 0) {
            status.innerText = `🚀 ĐANG NẠP ${saved.length} FONTS TỪ BỘ NHỚ...`;
            saved.forEach(f => renderFont(f.name, f.data));
            setTimeout(() => { status.innerText = `✨ HỆ THỐNG SẴN SÀNG (${saved.length} FONTS)`; }, 1000);
        } else {
            status.innerHTML = `🌐 ĐANG TẢI DỮ LIỆU LẦN ĐẦU... <div class="loader"></div>`;
            let count = 0;
            for (let link of IPFS_LINKS) {
                try {
                    const resp = await fetch(link);
                    const zip = await JSZip.loadAsync(await resp.blob());
                    for (let name in zip.files) {
                        if (!zip.files[name].dir && /\.(ttf|otf)$/i.test(name)) {
                            const data = await zip.files[name].async("arraybuffer");
                            const cleanName = name.split('/').pop();
                            renderFont(cleanName, data);
                            saveToDB(cleanName + count, cleanName, data);
                            count++;
                            status.innerText = `ĐANG TẢI: ${count} FONTS...`;
                        }
                    }
                } catch(e) {}
            }
            status.innerText = `✅ HOÀN TẤT: ${count} FONTS ĐÃ SẴN SÀNG`;
        }
    }

    function saveToDB(id, name, data) {
        const tx = db.transaction("fonts", "readwrite");
        tx.objectStore("fonts").put({ id, name, data });
    }

    function renderFont(name, data) {
        const fontId = 'f' + Math.random().toString(36).substr(2, 5);
        const fontFace = new FontFace(fontId, data);
        fontFace.load().then(f => {
            document.fonts.add(f);
            const card = document.createElement('div');
            card.className = 'font-card';
            card.setAttribute('data-name', name.toLowerCase());
            card.innerHTML = `
                <div class="preview-wrapper" id="wrap_${fontId}">
                    <div class="preview-text" style="font-family: '${fontId}'">${document.getElementById('mainInput').value}</div>
                </div>
                <div class="card-footer">
                    <span class="font-name">${name}</span>
                    <button class="btn-download" onclick="downloadSmart('${fontId}', '${name}')">Tải PNG</button>
                </div>
            `;
            document.getElementById('fontGrid').appendChild(card);
            allCards.push(card);
        });
    }

    function updateAll() {
        const val = document.getElementById('mainInput').value;
        const color = document.getElementById('colorText').value;
        const bg = document.getElementById('colorBg').value;
        const fs = document.getElementById('sizeFont').value;
        const ls = document.getElementById('spacingText').value;
        const sw = document.getElementById('strokeWidth').value;
        const sc = document.getElementById('strokeColor').value;

        document.getElementById('fsVal').innerText = fs;
        document.getElementById('lsVal').innerText = ls;
        document.getElementById('swVal').innerText = sw;

        document.querySelectorAll('.preview-text').forEach(el => {
            el.innerText = val;
            el.style.setProperty('--text-color', color);
            el.style.setProperty('--fs', fs + 'px');
            el.style.setProperty('--ls', ls + 'px');
            el.style.setProperty('--sw', sw + 'px');
            el.style.setProperty('--sc', sc);
        });

        document.querySelectorAll('.preview-wrapper').forEach(el => {
            el.style.setProperty('--bg-color', bg);
        });
    }

    function filterFonts() {
        const q = document.getElementById('filterInput').value.toLowerCase();
        allCards.forEach(c => c.style.display = c.getAttribute('data-name').includes(q) ? 'block' : 'none');
    }

    async function downloadSmart(id, fileName) {
    const element = document.getElementById('wrap_' + id);
    
    // 1. Lưu lại màu nền hiện tại để khôi phục sau khi chụp
    const originalBg = element.style.background;
    
    // 2. Ép nền của vùng chứa về trong suốt trước khi chụp
    element.style.background = 'transparent';

    const canvas = await html2canvas(element, {
        backgroundColor: null, // Báo cho thư viện không vẽ nền canvas
        scale: 5,
        useCORS: true,
        logging: false,
        allowTaint: true
    });

    // 3. Khôi phục lại màu nền trên giao diện web để bạn tiếp tục làm việc
    element.style.background = originalBg;

    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    const link = document.createElement('a');
    link.download = `${fileName}_transparent.png`;
    link.href = canvas.toDataURL("image/png", 1.0);
    link.click();
}


    
</script>
</body>
</html>
