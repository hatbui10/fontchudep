<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>800+ Font Designer Pro Max</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #4facfe;
            --accent: #00f2fe;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --glass: rgba(30, 41, 59, 0.7);
            --input-height: 38px;
            --grid-width: 500px;
            --line-height: 1.2;
        }

        body { 
            font-family: 'Arial', sans-serif; background: var(--bg-dark); color: #f8fafc; margin: 0; padding: 20px;
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a); background-attachment: fixed;
        }

        @keyframes flashNotice {
            0%, 100% { opacity: 1; border-color: var(--primary); box-shadow: 0 0 10px rgba(79, 172, 254, 0.5); }
            50% { opacity: 0.5; border-color: transparent; box-shadow: none; }
        }

        .welcome-msg {
            text-align: center; padding: 15px; background: rgba(79, 172, 254, 0.1);
            border: 2px dashed var(--primary); border-radius: 12px;
            margin: 0 auto 20px auto; max-width: 1210px; color: var(--accent); font-size: 13px;
            animation: flashNotice 0.8s ease-in-out 6;
        }

        .master-controls {
            top: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin: 0 auto 30px auto; max-width: 1250px;
            display: grid; grid-template-columns: 1fr 400px; gap: 20px;
        }

        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        .right-panel { display: flex; flex-direction: column; gap: 15px; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.1); }
        .search-export-row { display: grid; grid-template-columns: 1fr 180px; gap: 10px; }
        .params-row, .colors-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
       .spacing-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .control-item { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: none; }

        textarea#mainInput, input[type="text"], input[type="number"] { 
            width: 100%; box-sizing: border-box; padding: 0 12px;
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); 
            color: white; border-radius: 8px; font-size: 13px; height: var(--input-height);
        }
        textarea#mainInput { height: 80px; padding: 10px; line-height: 1.4; }

        .input-with-btn { display: flex; gap: 4px; }
        .btn-apply-small {
            background: var(--primary); border: none; color: #0f172a; border-radius: 8px;
            padding: 0 10px; cursor: pointer; font-size: 10px; font-weight: 800; height: var(--input-height);
            white-space: nowrap;
        }

        input[type="color"] { -webkit-appearance: none; border: 1px solid rgba(255,255,255,0.1); width: 100%; height: var(--input-height); cursor: pointer; background: none; border-radius: 8px; padding: 2px;}

        .checkbox-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(15, 23, 42, 0.8); border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1); height: var(--input-height); cursor: pointer;
        }

        .font-grid { display: grid; grid-template-columns: repeat(auto-fit, var(--grid-width)); gap: 20px; justify-content: center; margin: 20px auto; }
        .font-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); width: var(--grid-width); }
        .preview-wrapper { min-height: 140px; display: flex; align-items: center; justify-content: center; padding: 15px; transition: background 0.3s; }
       .preview-text { 
            font-size: var(--fs, 35px); 
            color: var(--text-color, #4facfe); 
            text-align: center; 
           line-height: var(--lh, 1.2); /* Sử dụng biến --lh */
                 
            /* SỬA LẠI ĐỂ KHÔNG CẮT CHỮ */
            word-break: keep-all;       /* Giữ nguyên từ, không ngắt quãng giữa chữ */
            overflow-wrap: break-word;  /* Chỉ xuống dòng khi gặp khoảng trắng */
            white-space: pre-wrap;      /* Giữ lại các dấu xuống dòng bạn tự nhập (Enter) */
            
            display: inline-block;
            max-width: 100%;            /* Giữ chữ luôn nằm trong khung */
            text-rendering: geometricPrecision;
            -webkit-font-smoothing: antialiased;
        }
        
        .card-footer { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 23, 42, 0.9); }
        .font-info { display: flex; flex-direction: column; gap: 4px; max-width: 55%; }
        .font-name { font-size: 10px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-copy-name { background: rgba(79, 172, 254, 0.1); border: 1px solid rgba(79, 172, 254, 0.3); color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 8px; cursor: pointer; font-weight: bold; }
        .footer-btns { display: flex; gap: 6px; }
        .btn-download, .btn-copy { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 9px; text-transform: uppercase; }
        .btn-download { background: #334155; color: white; }
        .btn-copy { background: rgba(79, 172, 254, 0.2); color: var(--primary); border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="status" style="text-align: center; font-size: 11px; color: var(--primary); margin-bottom: 10px;">ĐANG KHỞI TẠO...</div>

<div class="master-controls">
    <div class="left-panel">
        <div class="control-item">
            <label>Nội dung hiển thị</label>
            <textarea id="mainInput" oninput="updateAll()" placeholder="Nhập nội dung..."></textarea>
        </div>
        <div class="search-export-row">
            <div class="control-item">
                <label>Tìm kiếm Font</label>
                <div class="input-with-btn">
                    <input type="text" id="filterInput" placeholder="Dán tên font..." oninput="filterFonts()">
                    <button class="btn-apply-small" onclick="pasteFontName(this)">PASTE</button>
                </div>
            </div>
            <div class="control-item">
                <label>Xuất ảnh</label>
                <label class="checkbox-wrapper">
                    <input type="checkbox" id="keepBg" onchange="updateAll()" style="width: 14px; height: 14px;">
                    <span style="font-size: 9px; font-weight: bold;">CÓ NỀN</span>
                </label>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="params-row">
            <div class="control-item"><label>Rộng Khung</label><div class="input-with-btn"><input type="number" id="gridWidthInput" value="500"><button class="btn-apply-small" onclick="updateGridWidth()">OK</button></div></div>
            <div class="control-item"><label>Size Chữ</label><div class="input-with-btn"><input type="number" id="sizeFont" value="35"><button class="btn-apply-small" onclick="updateAll()">OK</button></div></div>
            <div class="control-item"><label>Dày viền</label><div class="input-with-btn"><input type="number" id="strokeWidth" value="0" step="0.5"><button class="btn-apply-small" onclick="updateAll()">OK</button></div></div>
        </div>
        <div class="colors-row">
            <div class="control-item"><label>Chữ</label><input type="color" id="colorText" value="#4facfe" oninput="updateAll()"></div>
            <div class="control-item"><label>Nền</label><input type="color" id="colorBg" value="#0f172a" oninput="updateAll()"></div>
            <div class="control-item"><label>Viền</label><input type="color" id="strokeColor" value="#000000" oninput="updateAll()"></div>
        </div>
        <div class="spacing-row">
            <div class="control-item"><label>Khoảng cách giữa các chữ cái </label><div class="input-with-btn"><input type="number" id="spacingText" value="2"><button class="btn-apply-small" onclick="updateAll()">OK</button></div></div>
            <div class="control-item"><label>Khoảng cách giữa các từ</label><div class="input-with-btn"><input type="number" id="wordSpacing" value="5"><button class="btn-apply-small" onclick="updateAll()">OK</button></div></div>
            <div class="control-item">
        <label>Khoảng cách giữa các dòng</label>
        <div class="input-with-btn">
            <input type="number" id="lineHeight" value="1.2" step="0.1">
            <button class="btn-apply-small" onclick="updateAll()">OK</button>
        </div>
    </div>
        </div>
    </div>
</div>

<div id="fontGrid" class="font-grid"></div>

<script>
    // --- PHẦN LOGIC CODE GIỮ NGUYÊN ---
    const IPFS_LINKS = ["https://tomato-delicate-zebra-533.mypinata.cloud/ipfs/bafybeihealjo5tc2mvh3ksx22ps7yjbpcj4pkm67r33qkx72ppw5lberau","https://ipfs.io/ipfs/bafybeicbczbfcyi4ahwe4f5flrq2d2nalddy3usbjeiqy247pyeuybi63q","https://ipfs.io/ipfs/bafybeibpq4mm4gojqtqe4q4bzaikdcglxmrnalniolnnet4nrc75f6ayt4"];
    let db; let allCards = [];
    const req = indexedDB.open("FontStorePro", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("fonts", { keyPath: "id" });
    req.onsuccess = e => { db = e.target.result; loadFonts(); };

    async function loadFonts() {
        const tx = db.transaction("fonts", "readonly");
        const saved = await new Promise(r => tx.objectStore("fonts").getAll().onsuccess = e => r(e.target.result));
        if (saved.length > 0) {
            saved.forEach(f => renderFont(f.name, f.data));
            document.getElementById('status').innerText = `✨ SẴN SÀNG (${saved.length} FONTS)`;
        } else {
            document.getElementById('status').innerText = `🌐 ĐANG TẢI...`;
            let count = 0;
            for (let link of IPFS_LINKS) {
                try {
                    const resp = await fetch(link);
                    const zip = await JSZip.loadAsync(await resp.blob());
                    for (let name in zip.files) {
                        if (!zip.files[name].dir && /\.(ttf|otf)$/i.test(name)) {
                            const data = await zip.files[name].async("arraybuffer");
                            const cleanName = name.split('/').pop();
                            renderFont(cleanName, data);
                            const txW = db.transaction("fonts", "readwrite");
                            txW.objectStore("fonts").put({ id: cleanName + count, name: cleanName, data });
                            count++;
                        }
                    }
                } catch(e) {}
            }
            document.getElementById('status').innerText = `✅ Đã copy xong!: ${count} FONTS`;
        }
    }

    function renderFont(name, data) {
        const fontId = 'f' + Math.random().toString(36).substr(2, 5);
        const fontFace = new FontFace(fontId, data);
        fontFace.load().then(f => {
            document.fonts.add(f);
            const card = document.createElement('div');
            card.className = 'font-card';
            card.setAttribute('data-name', name.toLowerCase());
            card.innerHTML = `<div class="preview-wrapper" id="wrap_${fontId}"><div class="preview-text" style="font-family: '${fontId}'">${document.getElementById('mainInput').value || 'Sadhu Sadhu!'}</div></div><div class="card-footer"><div class="font-info"><span class="font-name" title="${name}">${name}</span><button class="btn-copy-name" onclick="copyFontName('${name}', this)">COPY FONT</button></div><div class="footer-btns"><button class="btn-copy" onclick="copyToClipboard(this)">Copy chữ </button><button class="btn-download" onclick="downloadSmart('${fontId}', '${name}')"> Tải PNG</button></div></div>`;
            document.getElementById('fontGrid').appendChild(card);
            allCards.push(card);
            updateAll();
        });
    }

    // --- SỬA LỖI NÚT PASTE Ở ĐÂY ---
    async function pasteFontName(btn) {
        try {
            // Cách 1: Thử dùng API Clipboard hiện đại
            const text = await navigator.clipboard.readText();
            if (text) {
                const input = document.getElementById('filterInput');
                input.value = text;
                filterFonts();
                btn.innerText = "OK!";
                setTimeout(() => btn.innerText = "PASTE", 800);
            }
        } catch (err) {
            // Cách 2: Nếu bị chặn quyền (thường dính ở Chrome), báo người dùng dán tay hoặc kiểm tra quyền
            console.warn('Clipboard API bị chặn hoặc không khả dụng.');
            alert("Trình duyệt yêu cầu quyền truy cập Clipboard. Bạn hãy nhấn Ctrl+V vào ô tìm kiếm nhé!");
        }
    }

    function copyFontName(name, btn) {
        navigator.clipboard.writeText(name).then(() => {
            const oldText = btn.innerText; btn.innerText = "ĐÃ COPY!";
            setTimeout(() => btn.innerText = oldText, 1200);
        });
    }

    function updateGridWidth() { document.documentElement.style.setProperty('--grid-width', document.getElementById('gridWidthInput').value + 'px'); }

    function updateAll() {
        const val = document.getElementById('mainInput').value || "Sadhu Sadhu!";
        const color = document.getElementById('colorText').value;
        const bg = document.getElementById('colorBg').value;
        const fs = document.getElementById('sizeFont').value;
        const ls = document.getElementById('spacingText').value;
        const ws = document.getElementById('wordSpacing').value;
        const lh = document.getElementById('lineHeight').value; // Thêm dòng này
        const sw = document.getElementById('strokeWidth').value;
        const sc = document.getElementById('strokeColor').value;
        const isKeepBg = document.getElementById('keepBg').checked;
        document.querySelectorAll('.preview-text').forEach(el => {
            el.innerText = val; el.style.color = color; el.style.fontSize = fs + 'px';
            el.style.letterSpacing = ls + 'px'; 
            el.style.wordSpacing = ws + 'px';
            el.style.lineHeight = lh; // Thêm dòng này để thực thi khoảng cách dòng
            el.style.webkitTextStroke = sw + 'px ' + sc;
        });
        document.querySelectorAll('.preview-wrapper').forEach(el => { el.style.backgroundColor = isKeepBg ? bg : 'transparent'; });
    }

    function filterFonts() {
        const q = document.getElementById('filterInput').value.toLowerCase();
        allCards.forEach(c => c.style.display = c.getAttribute('data-name').includes(q) ? 'block' : 'none');
    }

    async function copyToClipboard(btn) {
        const wrap = btn.closest('.font-card').querySelector('.preview-wrapper');
        const isKeepBg = document.getElementById('keepBg').checked;
        const bgColor = isKeepBg ? document.getElementById('colorBg').value : null;
        const canvas = await html2canvas(wrap, { backgroundColor: bgColor, scale: 2, useCORS: true, logging: false });
        canvas.toBlob(async b => {
            try { await navigator.clipboard.write([new ClipboardItem({"image/png": b})]); btn.innerText = "Xong!"; setTimeout(() => btn.innerText = "Copy", 1500); } catch (err) { alert("Lỗi copy ảnh!"); }
        });
    }

    async function downloadSmart(id, name) {
        const wrap = document.getElementById('wrap_' + id);
        const isKeepBg = document.getElementById('keepBg').checked;
        const bgColor = isKeepBg ? document.getElementById('colorBg').value : null;
        const canvas = await html2canvas(wrap, { backgroundColor: bgColor, scale: 2, useCORS: true, logging: false });
        const link = document.createElement('a'); link.download = name + ".png"; link.href = canvas.toDataURL("image/png"); link.click();
    }
</script>
</body>
</html>
